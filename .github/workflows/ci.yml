name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Run unit tests
        run: bash tests/run.sh -v
      - name: Check render drift
        run: python3 scripts/render.py --check

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck on hooks
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "./hooks"
          severity: warning
      - name: Run shellcheck on scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "./scripts"
          severity: warning
      - name: Run shellcheck on tests
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "./tests"
          severity: warning

  json-validate:
    name: Validate JSON manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate plugin.json
        run: python3 -c "import json, sys; json.load(open('.claude-plugin/plugin.json')); print('plugin.json OK')"
      - name: Validate marketplace.json
        run: python3 -c "import json, sys; json.load(open('.claude-plugin/marketplace.json')); print('marketplace.json OK')"
      - name: Validate per-persona _meta.json
        run: |
          for meta in rules/*/_meta.json; do
            python3 -c "import json; json.load(open('$meta'))" && echo "$meta OK"
          done
