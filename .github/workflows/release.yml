name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify plugin.json version matches tag
        run: |
          manifest_version=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          if [ "$manifest_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::plugin.json version ($manifest_version) does not match tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Extract CHANGELOG section for this release
        id: changelog
        run: |
          python3 <<'PY' > release-notes.md
          from pathlib import Path
          import re
          import os
          version = os.environ["VERSION"]
          text = Path("CHANGELOG.md").read_text()
          # Find '## [<version>]' section; grab until next '## ['
          pattern = re.compile(rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)", re.DOTALL)
          m = pattern.search(text)
          if not m:
              print(f"ERROR: no CHANGELOG entry found for {version}", flush=True)
              raise SystemExit(2)
          print(m.group(1).strip())
          PY
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Build tarball
        run: |
          mkdir -p dist
          tarball="dist/chrysippus-${{ steps.version.outputs.version }}.tar.gz"
          git archive --format=tar.gz --prefix="chrysippus-${{ steps.version.outputs.version }}/" \
            -o "$tarball" "${{ steps.version.outputs.tag }}"
          ls -la dist/

      - name: Compute SHA256
        id: sha
        run: |
          cd dist
          sha256sum "chrysippus-${{ steps.version.outputs.version }}.tar.gz" > "chrysippus-${{ steps.version.outputs.version }}.tar.gz.sha256"
          cat "chrysippus-${{ steps.version.outputs.version }}.tar.gz.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: release-notes.md
          files: |
            dist/chrysippus-${{ steps.version.outputs.version }}.tar.gz
            dist/chrysippus-${{ steps.version.outputs.version }}.tar.gz.sha256
          draft: false
          prerelease: false
