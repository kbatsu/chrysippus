name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify plugin.json version matches tag
        run: |
          manifest_version=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          if [ "$manifest_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::plugin.json version ($manifest_version) does not match tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Build release notes from tag annotation + commit log
        run: |
          tag="${{ steps.version.outputs.tag }}"
          {
            # Annotated tag body (the -m message you pass to `git tag -a`)
            git tag -l --format='%(contents:body)' "$tag" | sed '/^-----BEGIN PGP SIGNATURE-----/,$d'
            echo
            # If a previous tag exists, append a one-line commit log since then.
            prev="$(git describe --tags --abbrev=0 "$tag^" 2>/dev/null || true)"
            if [ -n "$prev" ]; then
              echo "## Commits since $prev"
              echo
              git log --pretty='- %s' "$prev..$tag"
            fi
          } > release-notes.md
          echo "--- release-notes.md ---"
          cat release-notes.md

      - name: Build tarball
        run: |
          mkdir -p dist
          tarball="dist/chrysippus-${{ steps.version.outputs.version }}.tar.gz"
          git archive --format=tar.gz --prefix="chrysippus-${{ steps.version.outputs.version }}/" \
            -o "$tarball" "${{ steps.version.outputs.tag }}"
          ls -la dist/

      - name: Compute SHA256
        run: |
          cd dist
          sha256sum "chrysippus-${{ steps.version.outputs.version }}.tar.gz" > "chrysippus-${{ steps.version.outputs.version }}.tar.gz.sha256"
          cat "chrysippus-${{ steps.version.outputs.version }}.tar.gz.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: release-notes.md
          files: |
            dist/chrysippus-${{ steps.version.outputs.version }}.tar.gz
            dist/chrysippus-${{ steps.version.outputs.version }}.tar.gz.sha256
          draft: false
          prerelease: false
